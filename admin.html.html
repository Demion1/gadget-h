<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Gadget HQ</title>
</head>
<body style="margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa;">
    <!-- Header with logo linking to index.html -->
    <div style="background: #1a252f; padding: 15px 25px; border-bottom: 1px solid #2c3e50;">
        <a href="index.html" style="text-decoration: none; color: white; font-size: 1.5rem; font-weight: bold;">
            <span style="color: #3498db;">Gadget</span>HQ <span style="font-size: 0.9rem; color: #7f8c8d; margin-left: 10px;">Admin</span>
        </a>
    </div>

    <section class="dashboard" style="display: flex; min-height: 100vh;">
        <!-- Sidebar -->
        <aside class="sidebar" style="width: 250px; background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); color: white; padding: 25px 0; box-shadow: 3px 0 15px rgba(0,0,0,0.1);">
            <a href="#" style="display: block; color: #ecf0f1; text-decoration: none; padding: 15px 25px; margin: 5px 0; transition: all 0.3s; border-left: 4px solid transparent; font-size: 16px; font-weight: 500;">
                <span style="margin-right: 10px;">👤</span> Users
            </a>
            <a href="#" style="display: block; color: #ecf0f1; text-decoration: none; padding: 15px 25px; margin: 5px 0; transition: all 0.3s; border-left: 4px solid transparent; font-size: 16px; font-weight: 500;">
                <span style="margin-right: 10px;">📦</span> Products
            </a>
            <a href="#" style="display: block; color: #ecf0f1; text-decoration: none; padding: 15px 25px; margin: 5px 0; transition: all 0.3s; border-left: 4px solid transparent; font-size: 16px; font-weight: 500;">
                <span style="margin-right: 10px;">🔄</span> Swaps
            </a>
            <a href="#" style="display: block; color: #ecf0f1; text-decoration: none; padding: 15px 25px; margin: 5px 0; transition: all 0.3s; border-left: 4px solid transparent; font-size: 16px; font-weight: 500;">
                <span style="margin-right: 10px;">💰</span> Payments
            </a>
            <a href="#" style="display: block; color: #ecf0f1; text-decoration: none; padding: 15px 25px; margin: 5px 0; transition: all 0.3s; border-left: 4px solid transparent; font-size: 16px; font-weight: 500;">
                <span style="margin-right: 10px;">📊</span> Reports
            </a>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-content" style="flex: 1; padding: 40px; background-color: #ffffff; border-radius: 8px 0 0 8px; box-shadow: -2px 0 10px rgba(0,0,0,0.05);">
            <h2 style="color: #2c3e50; font-size: 32px; font-weight: 700; margin-bottom: 10px;">Admin Dashboard</h2>
            <p style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;">Monitor platform activities in real-time</p>
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 10px; margin-top: 20px;">
                <h3 style="margin: 0 0 10px 0; font-size: 20px;">📈 Quick Stats</h3>
                <p style="margin: 0; opacity: 0.9;">All systems operational • Last updated: Just now</p>
            </div>
        </main>
    </section>

    <style>
        /* Hover effects that can't be done inline */
        a:hover {
            background-color: rgba(255,255,255,0.1) !important;
            border-left-color: #3498db !important;
            color: #fff !important;
        }
    </style>
</body>
</html>
